<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boram's MEMO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sidebar-bg: #f5f4ef;
  --sidebar-hover: #eceae4;
  --sidebar-active: #e2e0d9;
  --nb-panel-bg: #f4f4f4;
  --nb-panel-border: #e2e2e2;
  --nb-card-active: #ebebeb;
  --editor-bg: #f5f4ef;
  --text-primary: #111111;
  --text-secondary: #555555;
  --text-tertiary: #999999;
  --green: #2e2e2e;
  --green-dark: #111111;
  --tag-bg: #f0f0f0;
  --tag-text: #333333;
  --tag-border: #d8d8d8;
  --toolbar-bg: #fafafa;
  --r: 4px;
}
html,body{height:100%;background:#f5f4ef;font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--text-primary);}
#app{display:flex;height:100vh;overflow:hidden;}

/* Left nav */
#leftnav{width:54px;background:#eeede7;display:flex;flex-direction:column;align-items:center;padding:12px 0;flex-shrink:0;border-right:1px solid #dddcd6;}
.lnav-logo{width:34px;height:34px;margin-bottom:18px;background:rgba(0,0,0,0.12);border:1px solid rgba(0,0,0,0.1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.lnav-item{width:38px;height:38px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:3px;color:#888;font-size:17px;transition:background .1s,color .1s;position:relative;}
.lnav-item:hover{background:rgba(0,0,0,0.08);color:#333;}
.lnav-item.active{background:rgba(0,0,0,0.1);color:#111;}
.lnav-item.active::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:0 2px 2px 0;background:#333;}
.lnav-sep{width:26px;height:1px;background:rgba(0,0,0,0.12);margin:6px 0;}

/* Sidebar */
#sidebar{width:198px;flex-shrink:0;background:#f5f4ef;border-right:1px solid #dddcd6;display:flex;flex-direction:column;overflow:hidden;color:#333;}
#sidebar-top{padding:12px 10px 8px;}
#new-note-btn{width:100%;padding:8px 12px;background:#333;color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:background .1s;}
#new-note-btn:hover{background:#111;}
#sb-search-wrap{padding:4px 10px 8px;}
#sb-search{width:100%;padding:6px 10px;background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.1);border-radius:var(--r);color:#333;font-size:12.5px;outline:none;font-family:inherit;}
#sb-search::placeholder{color:#999;}
#sb-search:focus{border-color:rgba(0,0,0,0.25);}
#sidebar-nav{flex:1;overflow-y:auto;padding-bottom:8px;}
.sb-label-section{padding:10px 14px 4px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888;}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:13px;color:#555;cursor:pointer;transition:background .1s;border-left:3px solid transparent;user-select:none;}
.sb-item:hover{background:rgba(0,0,0,0.06);}
.sb-item.active{background:rgba(0,0,0,0.1);border-left-color:#333;color:#111;}
.sb-item.active .sb-cnt{color:#666;}
.sb-icon{font-size:13px;width:16px;flex-shrink:0;}
.sb-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-cnt{font-size:11px;color:#aaa;}
.sb-indent{padding-left:26px!important;}
#sidebar-footer{padding:8px;border-top:1px solid #dddcd6;}
#add-nb-btn{width:100%;padding:7px;background:none;border:1px dashed rgba(0,0,0,0.2);color:#888;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:inherit;transition:all .1s;}
#add-nb-btn:hover{border-color:#555;color:#333;}

/* Note list */
#notelist{width:268px;flex-shrink:0;background:#f5f4ef;border-right:1px solid #dddcd6;display:flex;flex-direction:column;overflow:hidden;}
#notelist-header{padding:12px 13px 10px;border-bottom:1px solid #dddcd6;background:#f5f4ef;}
#notelist-title{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:8px;}
#notelist-tools{display:flex;gap:6px;align-items:center;}
#notelist-search{flex:1;padding:6px 9px;border:1px solid #cac9c3;border-radius:var(--r);font-size:12.5px;background:#eeede7;outline:none;font-family:inherit;color:var(--text-primary);}
#notelist-search:focus{border-color:#aaa;background:#f5f4ef;}
#notelist-search::placeholder{color:#aaa;}
.sort-btn{padding:5px 8px;border:1px solid #cac9c3;background:#f5f4ef;border-radius:var(--r);font-size:11px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;font-family:inherit;}
#note-cnt{font-size:11px;color:var(--text-tertiary);padding:6px 13px 3px;}
#note-list{flex:1;overflow-y:auto;}
.note-card{padding:12px 13px;border-bottom:1px solid #dddcd6;cursor:pointer;background:#f5f4ef;transition:background .1s;position:relative;}
.note-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:#555;transition:width .1s;}
.note-card:hover{background:#eeede7;}
.note-card.active{background:#e5e4de;}
.note-card.active::after{width:3px;background:#333;}
.nc-title{font-size:13.5px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.nc-preview{font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.nc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.nc-date{font-size:11px;color:var(--text-tertiary);margin-left:auto;}
.nc-tag{font-size:11px;padding:1px 7px;border-radius:3px;background:#e2e1db;color:#555;border:1px solid #cac9c3;}
.nc-nb{font-size:11px;color:var(--text-tertiary);}

/* Editor */
#editor{flex:1;display:flex;flex-direction:column;background:var(--editor-bg);overflow:hidden;}
#editor-topbar{padding:9px 18px;border-bottom:1px solid #dddcd6;display:flex;align-items:center;gap:6px;background:#f5f4ef;flex-wrap:wrap;}
.etb-btn{padding:5px 10px;border:1px solid #cac9c3;border-radius:var(--r);background:#f5f4ef;font-size:12px;color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all .1s;display:flex;align-items:center;gap:4px;}
.etb-btn:hover{background:#e8e7e1;border-color:#b5b4ae;color:var(--text-primary);}
.etb-sep{width:1px;height:18px;background:#d8d7d1;margin:0 2px;}
#btn-share{margin-left:auto;background:#222;color:#fff;border-color:#222;}
#btn-share:hover{background:#000;border-color:#000;color:#fff;}
#btn-del{color:#c0392b;border-color:#f0d0ce;}
#btn-del:hover{background:#fdf0ef;}

#fmt-toolbar{padding:6px 14px;border-bottom:1px solid #dddcd6;background:#f5f4ef;display:flex;align-items:center;gap:1px;flex-wrap:wrap;}
.fmt-btn{padding:5px 8px;border:none;background:none;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text-secondary);font-family:inherit;transition:background .1s;line-height:1;}
.fmt-btn:hover{background:#e2e1db;color:var(--text-primary);}
.fmt-sep{width:1px;height:16px;background:#cac9c3;margin:0 4px;}

#editor-title-area{padding:18px 22px 8px;background:#f5f4ef;}
#editor-title{width:100%;border:none;outline:none;font-size:23px;font-weight:600;color:var(--text-primary);font-family:inherit;background:transparent;line-height:1.3;}
#editor-title::placeholder{color:#bbb;}

#editor-meta-row{padding:0 22px 8px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#f5f4ef;}
.meta-item{font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;}
.meta-val{color:var(--text-secondary);}

#editor-tags{padding:4px 22px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid #dddcd6;min-height:34px;background:#f5f4ef;}
.e-tag{display:flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px 3px 10px;background:#e2e1db;color:#444;border:1px solid #cac9c3;border-radius:3px;}
.e-tag-rm{cursor:pointer;color:#999;font-size:14px;line-height:1;}
.e-tag-rm:hover{color:#c0392b;}
#tag-add-wrap{display:flex;align-items:center;gap:3px;color:var(--text-tertiary);font-size:12px;}
#tag-input{border:none;outline:none;background:transparent;font-size:12px;color:var(--text-primary);font-family:inherit;min-width:80px;}
#tag-input::placeholder{color:#bbb;}

#img-area{padding:8px 22px 0;display:flex;gap:10px;flex-wrap:wrap;background:#f5f4ef;}
.img-wrap{position:relative;}
.img-thumb{width:80px;height:80px;object-fit:cover;border-radius:var(--r);border:1px solid #cac9c3;display:block;cursor:pointer;}
.img-rm{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#555;color:#fff;border:2px solid #f5f4ef;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
.img-rm:hover{background:#c0392b;}

#editor-body{flex:1;resize:none;border:none;outline:none;padding:10px 22px 20px;font-size:15px;line-height:1.85;color:var(--text-primary);background:#f5f4ef;font-family:inherit;overflow-y:auto;}
#editor-body::placeholder{color:#bbb;}

#editor-status{padding:6px 22px;border-top:1px solid #dddcd6;display:flex;align-items:center;justify-content:space-between;background:#f5f4ef;}
#status-words{font-size:11px;color:var(--text-tertiary);}
#status-storage{font-size:11px;color:var(--text-tertiary);display:flex;align-items:center;gap:6px;}
#storage-track{width:60px;height:3px;background:#d0cfc9;border-radius:2px;overflow:hidden;}
#storage-fill{height:100%;background:#555;border-radius:2px;transition:width .3s;}

#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-tertiary);background:#f5f4ef;}
.es-icon{font-size:50px;opacity:.2;}
.es-title{font-size:16px;font-weight:500;color:var(--text-secondary);}
.es-sub{font-size:13px;}
.es-action{margin-top:8px;padding:9px 20px;background:#222;color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.es-action:hover{background:#000;}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:4px;}
#lb-close{position:absolute;top:18px;right:22px;color:#fff;font-size:26px;cursor:pointer;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:3px;}
#sidebar ::-webkit-scrollbar-thumb{background:#444;}
</style>
</head>
<body>
<div id="app">

  <div id="leftnav">
    <div class="lnav-logo">📝</div>
    <div class="lnav-item active" title="노트">📄</div>
    <div class="lnav-item" title="노트북">📚</div>
    <div class="lnav-item" title="태그">🏷</div>
    <div class="lnav-sep"></div>
    <div class="lnav-item" title="설정" style="margin-top:auto">⚙️</div>
  </div>

  <div id="sidebar">
    <div id="sidebar-top"><button id="new-note-btn">＋ 새 노트</button></div>
    <div id="sb-search-wrap"><input id="sb-search" type="text" placeholder="🔍  검색..." /></div>
    <div id="sidebar-nav">
      <div class="sb-label-section">바로가기</div>
      <div class="sb-item active" id="sb-all">
        <span class="sb-icon">📝</span><span class="sb-name">모든 노트</span><span class="sb-cnt" id="all-cnt">0</span>
      </div>
      <div class="sb-label-section" style="margin-top:6px">노트북</div>
      <div id="nb-nav"></div>
      <div class="sb-label-section" style="margin-top:6px">태그</div>
      <div id="tag-nav"></div>
    </div>
    <div id="sidebar-footer"><button id="add-nb-btn">＋ 노트북 추가</button></div>
  </div>

  <div id="notelist">
    <div id="notelist-header">
      <div id="notelist-title">모든 노트</div>
      <div id="notelist-tools">
        <input id="notelist-search" type="text" placeholder="이 목록에서 검색..." />
        <button class="sort-btn">최신순 ▾</button>
      </div>
    </div>
    <div id="note-cnt">0개</div>
    <div id="note-list"></div>
  </div>

  <div id="editor">
    <div id="empty-state">
      <div class="es-icon">📄</div>
      <div class="es-title">노트를 선택하세요</div>
      <div class="es-sub">왼쪽에서 노트를 선택하거나 새로 만들어 보세요.</div>
      <button class="es-action" onclick="createNote()">새 노트 만들기</button>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLb()"><span id="lb-close">✕</span><img id="lb-img" src="" alt=""/></div>
<input type="file" id="img-input" accept="image/*" multiple style="display:none"/>

<script>
const KEY='ev_clone_v1';
const MAX_PX=900, IMG_Q=0.78;

let S={
  notebooks:[{id:'nb1',name:'개인'},{id:'nb2',name:'업무'},{id:'nb3',name:'아이디어'}],
  notes:[
    {id:'n1',nbId:'nb1',title:'환영합니다!',content:'에버노트와 유사한 메모 앱입니다.\n\n• 노트북으로 분류\n• 태그로 빠른 필터\n• 이미지 자동 압축\n• 브라우저에 영구 저장',tags:['시작하기'],images:[],date:new Date().toISOString(),starred:false},
    {id:'n2',nbId:'nb2',title:'주간 회의 메모',content:'- 프로젝트 현황\n- Q2 목표 점검\n- 스프린트 계획',tags:['업무','회의'],images:[],date:new Date(Date.now()-86400000).toISOString(),starred:false},
    {id:'n3',nbId:'nb3',title:'앱 아이디어',content:'에버노트 대신 직접 만들기\n• 노트북 구조\n• 태그 분류\n• 이미지 첨부\n• 완전 무료!',tags:['아이디어'],images:[],date:new Date(Date.now()-172800000).toISOString(),starred:true},
  ],
  selNb:null,selTag:null,selId:null,sbQ:'',listQ:'',
};

function save(){
  try{localStorage.setItem(KEY,JSON.stringify({notebooks:S.notebooks,notes:S.notes}));}
  catch(e){alert('저장 공간 부족. 이미지를 줄여 보세요.');}
  updateStorageUI();
}
function load(){
  try{const d=localStorage.getItem(KEY);if(d){const p=JSON.parse(d);S.notebooks=p.notebooks||S.notebooks;S.notes=p.notes||S.notes;}}catch(e){}
}
function updateStorageUI(){
  let used=0;
  for(let k in localStorage){if(localStorage.hasOwnProperty(k))used+=(localStorage[k].length+k.length)*2;}
  const kb=Math.round(used/1024);
  const pct=Math.min(100,(used/(5*1024*1024))*100);
  const sp=document.getElementById('status-storage');
  if(sp){sp.querySelector('span').textContent=`${kb}KB / 5MB`;}
  const fill=document.getElementById('storage-fill');
  if(fill){fill.style.width=pct+'%';fill.style.background=pct>80?'#c0392b':'var(--green)';}
}

function compressImage(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>MAX_PX||h>MAX_PX){if(w>h){h=Math.round(h*MAX_PX/w);w=MAX_PX;}else{w=Math.round(w*MAX_PX/h);h=MAX_PX;}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',IMG_Q));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function uid(){return 'id'+Date.now()+Math.random().toString(36).slice(2,5);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtShort(iso){
  const d=new Date(iso),now=new Date(),diff=now-d;
  if(diff<60000)return '방금 전';
  if(diff<3600000)return Math.floor(diff/60000)+'분 전';
  if(diff<86400000)return Math.floor(diff/3600000)+'시간 전';
  if(diff<604800000)return Math.floor(diff/86400000)+'일 전';
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}
function fmtFull(iso){return new Date(iso).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function allTags(){const t=new Set();S.notes.forEach(n=>n.tags.forEach(g=>t.add(g)));return[...t];}
function filtered(){
  let ns=[...S.notes];
  if(S.selNb)ns=ns.filter(n=>n.nbId===S.selNb);
  if(S.selTag)ns=ns.filter(n=>n.tags.includes(S.selTag));
  const q=(S.sbQ||S.listQ).toLowerCase();
  if(q)ns=ns.filter(n=>n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q));
  return ns.sort((a,b)=>new Date(b.date)-new Date(a.date));
}
function cur(){return S.notes.find(n=>n.id===S.selId);}
function wc(txt){return(txt||'').trim().split(/\s+/).filter(Boolean).length;}

function setActiveSb(el){document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));el.classList.add('active');}

function renderSidebar(){
  document.getElementById('all-cnt').textContent=S.notes.length;
  const nbNav=document.getElementById('nb-nav');nbNav.innerHTML='';
  S.notebooks.forEach(nb=>{
    const cnt=S.notes.filter(n=>n.nbId===nb.id).length;
    const el=document.createElement('div');
    el.className='sb-item sb-indent'+(S.selNb===nb.id&&!S.selTag?' active':'');
    el.innerHTML=`<span class="sb-icon">📓</span><span class="sb-name">${esc(nb.name)}</span><span class="sb-cnt">${cnt}</span>`;
    el.onclick=()=>{S.selNb=nb.id;S.selTag=null;S.sbQ='';document.getElementById('sb-search').value='';setActiveSb(el);renderNoteList();};
    nbNav.appendChild(el);
  });
  const tagNav=document.getElementById('tag-nav');tagNav.innerHTML='';
  allTags().forEach(tag=>{
    const el=document.createElement('div');
    el.className='sb-item sb-indent'+(S.selTag===tag?' active':'');
    el.innerHTML=`<span class="sb-icon" style="font-size:12px">🏷</span><span class="sb-name">${esc(tag)}</span>`;
    el.onclick=()=>{S.selTag=S.selTag===tag?null:tag;S.selNb=null;S.sbQ='';setActiveSb(S.selTag?el:document.getElementById('sb-all'));renderNoteList();};
    tagNav.appendChild(el);
  });
  if(!S.selNb&&!S.selTag)document.getElementById('sb-all').classList.add('active');
}

function renderNoteList(){
  const ns=filtered();
  const nb=S.notebooks.find(n=>n.id===S.selNb);
  document.getElementById('notelist-title').textContent=S.selTag?`#${S.selTag}`:(nb?nb.name:'모든 노트');
  document.getElementById('note-cnt').textContent=`${ns.length}개`;
  const list=document.getElementById('note-list');list.innerHTML='';
  if(!ns.length){list.innerHTML=`<div style="padding:24px;text-align:center;font-size:13px;color:var(--text-tertiary)">노트가 없습니다</div>`;return;}
  ns.forEach(note=>{
    const card=document.createElement('div');
    card.className='note-card'+(note.id===S.selId?' active':'');
    const preview=note.content.replace(/\n/g,' ').slice(0,65);
    const tagsHtml=note.tags.slice(0,2).map(t=>`<span class="nc-tag">${esc(t)}</span>`).join('');
    const nbName=S.notebooks.find(n=>n.id===note.nbId)?.name||'';
    const imgBadge=note.images?.length?`<span class="nc-nb">🖼 ${note.images.length}</span>`:'';
    card.innerHTML=`
      <div class="nc-title">${note.starred?'⭐ ':''}${esc(note.title)||'제목 없음'}</div>
      <div class="nc-preview">${esc(preview)||'내용 없음'}</div>
      <div class="nc-meta">${tagsHtml}${imgBadge}${!S.selNb&&nbName?`<span class="nc-nb">📓 ${esc(nbName)}</span>`:''}<span class="nc-date">${fmtShort(note.date)}</span></div>
    `;
    card.onclick=()=>{S.selId=note.id;renderNoteList();renderEditor();};
    list.appendChild(card);
  });
}

function renderEditor(){
  const panel=document.getElementById('editor');
  const note=cur();
  if(!note){
    panel.innerHTML=`<div id="empty-state"><div class="es-icon">📄</div><div class="es-title">노트를 선택하세요</div><div class="es-sub">왼쪽에서 노트를 선택하거나 새로 만들어 보세요.</div><button class="es-action" onclick="createNote()">새 노트 만들기</button></div>`;
    return;
  }
  const nb=S.notebooks.find(n=>n.id===note.nbId);
  panel.innerHTML=`
    <div id="editor-topbar">
      <button class="etb-btn" onclick="toggleStar()">⭐ ${note.starred?'즐겨찾기 해제':'즐겨찾기'}</button>
      <button class="etb-btn" onclick="moveNote()">📓 ${esc(nb?.name||'노트북')} ▾</button>
      <div class="etb-sep"></div>
      <button class="etb-btn" onclick="document.getElementById('img-input').click()">🖼 이미지</button>
      <button class="etb-btn" onclick="exportTxt()">⬇ 내보내기</button>
      <button class="etb-btn" id="btn-del" onclick="deleteNote()">🗑 삭제</button>
      <button class="etb-btn" id="btn-share" onclick="copyUrl()">🔗 공유</button>
    </div>
    <div id="fmt-toolbar">
      <button class="fmt-btn" onclick="wrapTa('**','**')"><b>B</b></button>
      <button class="fmt-btn" onclick="wrapTa('_','_')"><i>I</i></button>
      <button class="fmt-btn" onclick="wrapTa('__','__')"><u>U</u></button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" onclick="insLine('• ')">• 목록</button>
      <button class="fmt-btn" onclick="insLine('1. ')">1. 번호</button>
      <button class="fmt-btn" onclick="insLine('☐ ')">☐ 체크</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" onclick="insLine('──────────────\n')">— 구분선</button>
      <button class="fmt-btn" onclick="insDate()">📅 날짜</button>
    </div>
    <div id="editor-title-area"><input id="editor-title" type="text" placeholder="제목" value="${esc(note.title)}"/></div>
    <div id="editor-meta-row">
      <div class="meta-item">📓 <span class="meta-val">${esc(nb?.name||'-')}</span></div>
      <div class="meta-item">🕐 <span class="meta-val">${fmtFull(note.date)}</span></div>
    </div>
    <div id="editor-tags"></div>
    <div id="img-area"></div>
    <textarea id="editor-body" placeholder="노트 내용을 입력하세요...">${esc(note.content)}</textarea>
    <div id="editor-status">
      <span id="status-words">${wc(note.content)}단어</span>
      <div id="status-storage"><div id="storage-track"><div id="storage-fill"></div></div><span></span></div>
    </div>
  `;
  renderTags();renderImgs();updateStorageUI();
  document.getElementById('editor-title').oninput=e=>{note.title=e.target.value;note.date=new Date().toISOString();save();renderNoteList();};
  document.getElementById('editor-body').oninput=e=>{note.content=e.target.value;note.date=new Date().toISOString();document.getElementById('status-words').textContent=wc(e.target.value)+'단어';save();renderNoteList();};
}

function renderTags(){
  const row=document.getElementById('editor-tags');if(!row)return;
  const note=cur();if(!note)return;
  row.innerHTML='';
  note.tags.forEach(tag=>{
    const el=document.createElement('div');el.className='e-tag';
    el.innerHTML=`🏷 ${esc(tag)}<span class="e-tag-rm" data-tag="${esc(tag)}">×</span>`;
    el.querySelector('.e-tag-rm').onclick=ev=>{note.tags=note.tags.filter(t=>t!==ev.target.dataset.tag);save();renderSidebar();renderTags();renderNoteList();};
    row.appendChild(el);
  });
  const wrap=document.createElement('div');wrap.id='tag-add-wrap';
  wrap.innerHTML='<span>+</span>';
  const inp=document.createElement('input');inp.id='tag-input';inp.type='text';inp.placeholder='태그 추가...';
  inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value.trim()){const t=inp.value.trim();if(!note.tags.includes(t))note.tags.push(t);inp.value='';save();renderSidebar();renderTags();renderNoteList();}};
  wrap.appendChild(inp);row.appendChild(wrap);
}

function renderImgs(){
  const area=document.getElementById('img-area');if(!area)return;
  const note=cur();if(!note)return;
  area.innerHTML='';
  (note.images||[]).forEach((src,i)=>{
    const wrap=document.createElement('div');wrap.className='img-wrap';
    const img=document.createElement('img');img.className='img-thumb';img.src=src;
    img.onclick=()=>openLb(src);
    const rm=document.createElement('button');rm.className='img-rm';rm.textContent='×';
    rm.onclick=()=>{note.images.splice(i,1);save();renderImgs();};
    wrap.appendChild(img);wrap.appendChild(rm);area.appendChild(wrap);
  });
}

function wrapTa(a,b){
  const ta=document.getElementById('editor-body');if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.slice(s,e)||'텍스트';
  ta.value=ta.value.slice(0,s)+a+sel+b+ta.value.slice(e);
  ta.selectionStart=s+a.length;ta.selectionEnd=s+a.length+sel.length;
  ta.dispatchEvent(new Event('input'));
}
function insLine(p){
  const ta=document.getElementById('editor-body');if(!ta)return;
  const pos=ta.selectionStart,before=ta.value.slice(0,pos);
  const nl=before.length&&!before.endsWith('\n')?'\n':'';
  ta.value=before+nl+p+ta.value.slice(pos);
  ta.selectionStart=ta.selectionEnd=pos+nl.length+p.length;
  ta.dispatchEvent(new Event('input'));
}
function insDate(){insLine(new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})+' ');}

function toggleStar(){const n=cur();if(!n)return;n.starred=!n.starred;save();renderNoteList();renderEditor();}
function moveNote(){
  const note=cur();if(!note)return;
  const list=S.notebooks.map((nb,i)=>`${i+1}. ${nb.name}`).join('\n');
  const idx=parseInt(prompt('이동할 노트북 번호:\n'+list))-1;
  if(idx>=0&&idx<S.notebooks.length){note.nbId=S.notebooks[idx].id;save();renderSidebar();renderNoteList();renderEditor();}
}
function exportTxt(){
  const note=cur();if(!note)return;
  const txt=`# ${note.title}\n\n${note.content}\n\n---\n작성일: ${fmtFull(note.date)}\n태그: ${note.tags.join(', ')}`;
  const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);a.download=(note.title||'노트')+'.txt';a.click();
}
function copyUrl(){navigator.clipboard.writeText(location.href).then(()=>alert('URL이 복사되었습니다.'));}
function deleteNote(){
  const note=cur();if(!note)return;
  if(!confirm(`"${note.title||'이 노트'}"를 삭제할까요?`))return;
  S.notes=S.notes.filter(n=>n.id!==S.selId);
  S.selId=filtered()[0]?.id||null;
  save();renderSidebar();renderNoteList();renderEditor();
}
function createNote(){
  const note={id:uid(),nbId:S.selNb||S.notebooks[0]?.id||null,title:'',content:'',tags:[],images:[],date:new Date().toISOString(),starred:false};
  S.notes.unshift(note);S.selId=note.id;
  save();renderSidebar();renderNoteList();renderEditor();
  setTimeout(()=>document.getElementById('editor-title')?.focus(),50);
}
function addNotebook(){
  const name=prompt('노트북 이름:');if(!name?.trim())return;
  S.notebooks.push({id:uid(),name:name.trim()});
  save();renderSidebar();
}

document.getElementById('img-input').onchange=async e=>{
  const note=cur();if(!note)return;
  for(const file of[...e.target.files]){const c=await compressImage(file);if(!note.images)note.images=[];note.images.push(c);}
  e.target.value='';save();renderImgs();
};
function openLb(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLb(){document.getElementById('lightbox').classList.remove('open');}

document.getElementById('new-note-btn').onclick=createNote;
document.getElementById('add-nb-btn').onclick=addNotebook;
document.getElementById('sb-all').onclick=()=>{S.selNb=null;S.selTag=null;S.sbQ='';document.getElementById('sb-search').value='';setActiveSb(document.getElementById('sb-all'));renderNoteList();};
document.getElementById('sb-search').oninput=e=>{S.sbQ=e.target.value;S.selNb=null;S.selTag=null;setActiveSb(document.getElementById('sb-all'));renderNoteList();};
document.getElementById('notelist-search').oninput=e=>{S.listQ=e.target.value;renderNoteList();};

function render(){renderSidebar();renderNoteList();renderEditor();}
load();render();
</script>
</body>
</html>
